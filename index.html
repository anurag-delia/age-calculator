<!DOCTYPE html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="c1"></div>
    <div class="c2"></div>
    <div class="conatainer">
        <h2 class="head-line">Age <span>Calculator</span></h2>
        <h6 class="input-headline">Select Your Birth Date</h6>
        <input type="date" id="date-input">
        <button id="btn">Calculate Now</button>
        <!-- <p class="total-age">21 years 6 months 30 days</p> -->
        <div class="triple">
            <div class="one o"><p class="years y">--</p>
                <p class="month">YEAR</p>
            </div>
        <div class="two o"><p class="years m">--</p>
            <p class="month">MONTH</p>
        </div>
        <div class="three o"><p class="years d">--</p>
            <p class="month">DAYS</p>
            
        </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
